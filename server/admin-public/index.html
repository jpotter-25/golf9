<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Golf 9 Admin</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <main id="app">
      <section class="login shell">
        <p class="eyebrow">Golf 9 Operations</p>
        <h1>Admin Console</h1>
        <p class="muted">Sign in with an admin account. Local development defaults are admin / admin9 / 000000 unless bootstrap env vars are set.</p>
        <form id="loginForm" class="panel">
          <label>Admin name <input name="displayName" autocomplete="username" required /></label>
          <label>Password <input name="password" type="password" autocomplete="current-password" required /></label>
          <label>MFA code <input name="mfaCode" inputmode="numeric" placeholder="000000" /></label>
          <button type="submit">Sign In</button>
          <p id="loginError" class="error"></p>
        </form>
        <div class="panel compact">
          <div class="split-header">
            <div>
              <h2>Password Recovery</h2>
              <p id="recoveryStatus" class="muted">Checking recovery email status...</p>
            </div>
            <button id="toggleRecovery" class="ghost" type="button">Open</button>
          </div>
          <div id="recoveryPanel" class="hidden">
            <form id="recoveryRequestForm" class="compact">
              <label>Admin name or email <input name="identifier" autocomplete="username" required /></label>
              <button type="submit">Email Recovery Code</button>
            </form>
            <form id="recoveryCompleteForm" class="compact">
              <label>Admin name or email <input name="identifier" autocomplete="username" required /></label>
              <label>Recovery code <input name="code" inputmode="numeric" required /></label>
              <label>New password <input name="newPassword" type="password" autocomplete="new-password" required /></label>
              <button type="submit">Set New Password</button>
            </form>
            <p id="recoveryMessage" class="muted"></p>
          </div>
        </div>
      </section>
    </main>
    <template id="consoleTemplate">
      <section class="shell">
        <header class="topbar">
          <div>
            <p class="eyebrow">Golf 9 Operations</p>
            <h1>Admin Console</h1>
          </div>
          <button id="logoutButton" class="ghost">Log Out</button>
        </header>
        <nav class="tabs">
          <button data-tab="players" class="active">Players</button>
          <button data-tab="invites">Invites</button>
          <button data-tab="support">Support</button>
          <button data-tab="mail">Mail</button>
          <button data-tab="economy">Economy</button>
          <button data-tab="notifications">Notifications</button>
          <button data-tab="liveOps">Live Ops</button>
          <button data-tab="competitive">Competitive</button>
          <button data-tab="catalog">Catalog</button>
          <button data-tab="clubs">Clubs</button>
          <button data-tab="admins">Admins</button>
          <button data-tab="audit">Audit</button>
        </nav>
        <p id="status" class="status"></p>
        <section id="players" class="tab active">
          <div class="panel">
            <h2>Player Lookup</h2>
            <div class="row">
              <input id="playerSearch" placeholder="Search display name or user id" />
              <button id="searchPlayers">Search</button>
            </div>
            <div class="result-toolbar">
              <input id="playerResultFilter" placeholder="Filter loaded players by name, rank, club, status, or id" />
              <label class="checkline compact-check"><input id="showArchivedPlayers" type="checkbox" /> Archived players</label>
              <span id="playerResultCount" class="muted"></span>
            </div>
            <div id="playerResults" class="player-table-wrap"></div>
          </div>
          <div id="playerDetail" class="panel hidden"></div>
        </section>
        <section id="invites" class="tab">
          <div class="panel">
            <div class="split-header">
              <div>
                <h2>Pre-Alpha Invites</h2>
                <p class="muted">Create, inspect, and disable invite codes for private tester access.</p>
              </div>
              <button id="loadInvites">Refresh Invites</button>
            </div>
            <form id="inviteEditor" class="compact">
              <div class="row two">
                <input name="code" placeholder="Optional custom code" />
                <input name="label" placeholder="Label, e.g. Friends wave 1" />
              </div>
              <div class="row two">
                <input name="maxUses" type="number" min="1" max="500" placeholder="Max uses" />
                <input name="expiresAt" type="date" />
              </div>
              <input name="note" placeholder="Internal note" />
              <button type="submit">Create Invite</button>
            </form>
            <div id="inviteOutput" class="list"></div>
          </div>
        </section>
        <section id="support" class="tab">
          <div class="panel">
            <h2>Support Inbox</h2>
            <button id="loadTickets">Refresh Tickets</button>
            <div id="tickets" class="list"></div>
          </div>
        </section>
        <section id="mail" class="tab">
          <div class="panel">
            <div class="split-header">
              <div>
                <h2>System Mail</h2>
                <p class="muted">Send notices, compensation, coins, or cosmetics. Players can read, claim, keep, or delete these messages.</p>
              </div>
              <button id="loadMail">Refresh Mail</button>
            </div>
            <form id="mailComposer" class="editor">
              <div class="row three">
                <label>Recipients
                  <select name="targetMode">
                    <option value="all">Everyone</option>
                    <option value="selected">Selected players</option>
                    <option value="single">One player</option>
                  </select>
                </label>
                <label>Player IDs or names <input name="targets" placeholder="Comma-separated; blank for everyone" /></label>
                <label>Optional expiry <input name="expiresAt" type="date" /></label>
              </div>
              <input name="title" placeholder="Mail title" required />
              <textarea name="message" rows="4" placeholder="Message shown in the player mailbox" required></textarea>
              <div class="row three">
                <label>Coin reward <input name="coins" type="number" min="0" step="1" placeholder="0" /></label>
                <label>Cosmetic reward
                  <select name="cosmeticId">
                    <option value="">No cosmetic</option>
                  </select>
                </label>
                <label>Reason <input name="reason" placeholder="Required audit reason" required /></label>
              </div>
              <button type="submit">Send Mail</button>
            </form>
          </div>
          <div class="panel">
            <h2>Delivery History</h2>
            <div id="mailHistory" class="list"></div>
          </div>
        </section>
        <section id="economy" class="tab">
          <div class="panel">
            <div class="split-header">
              <div>
                <h2>Economy</h2>
                <p class="muted">Manage wager buy-in steps used by Auto-Match, Wager Tables, and the in-game economy catalog.</p>
              </div>
              <button id="loadEconomy">Refresh Economy</button>
            </div>
            <form id="economyConfigEditor" class="editor">
              <h3>Wager Tables</h3>
              <div class="toolbar">
                <button id="addWagerTable" type="button" class="ghost">Add Wager Option</button>
              </div>
              <div id="wagerTableRows" class="list"></div>
              <h3>Club Economy</h3>
              <div class="row three">
                <label>Club joining <input name="clubMinJoinLevel" type="text" value="Open to every level" disabled /></label>
                <label>Minimum level to create <input name="clubMinCreateLevel" type="number" min="1" /></label>
                <label>Club creation cost <input name="clubCreateCost" type="number" min="0" step="1" /></label>
              </div>
              <div class="toolbar">
                <button id="addClubPrestigeTier" type="button" class="ghost">Add Prestige Tier</button>
              </div>
              <div id="clubPrestigeRows" class="list"></div>
              <label>Reason <input name="reason" placeholder="Required audit reason" /></label>
              <button type="submit">Save Economy Settings</button>
            </form>
            <pre id="economyOutput" class="muted"></pre>
          </div>
        </section>
        <section id="competitive" class="tab">
          <div class="panel">
            <div class="split-header">
              <div>
                <h2>Competitive Operations</h2>
                <p class="muted">Control the hidden ranked model, seasons, matchmaking, queues, and support corrections.</p>
              </div>
              <div class="actions-inline">
                <button id="loadCompetitive">Refresh</button>
                <button id="publishCompetitive">Publish Draft</button>
                <button id="rollbackCompetitive" class="ghost">Rollback</button>
              </div>
            </div>
            <div id="competitiveOverview" class="grid"></div>
            <div id="competitivePreflight" class="competitive-preflight"></div>
          </div>
          <div class="competitive-workspace">
            <form id="competitiveConfigEditor" class="panel compact competitive-editor">
              <div class="split-header">
                <div>
                  <h3>Ranked Rules Studio</h3>
                  <p class="muted">Changes stay in draft until preflight passes and an administrator publishes them.</p>
                </div>
                <span id="competitiveDraftBadge" class="chip blue">Draft</span>
              </div>

              <div class="competitive-section">
                <div>
                  <h4>Placement And Confidence</h4>
                  <p class="muted">Five visible placements followed by a quiet calibration period for new ladders.</p>
                </div>
                <div class="row three">
                  <label>Placement matches <input name="placementMatchesRequired" type="number" min="1" max="20" /></label>
                  <label>Hidden calibration matches <input name="calibrationMatchesRequired" type="number" min="0" max="50" /></label>
                  <label>Strength adjustment cap <input name="strengthAdjustmentCap" type="number" min="0" max="50" /></label>
                </div>
                <div class="row three">
                  <label>Returning placement x <input name="returningPlacementMultiplier" type="number" min="0.1" max="3" step="0.05" /></label>
                  <label>Calibration wins x <input name="calibrationGainMultiplier" type="number" min="0.1" max="3" step="0.05" /></label>
                  <label>Calibration losses x <input name="calibrationLossMultiplier" type="number" min="0.1" max="3" step="0.05" /></label>
                </div>
                <label>First-placement strength cap <input name="firstPlacementStrengthCap" type="number" min="0" max="1000" /></label>
              </div>

              <div class="competitive-section">
                <div>
                  <h4>Finish Curves</h4>
                  <p class="muted">Set the baseline rating movement for each finishing position. Strength correction is applied separately.</p>
                </div>
                <div class="curve-row">
                  <strong>2 players</strong>
                  <label>1st <input name="delta2_1" type="number" /></label>
                  <label>2nd <input name="delta2_2" type="number" /></label>
                </div>
                <div class="curve-row">
                  <strong>3 players</strong>
                  <label>1st <input name="delta3_1" type="number" /></label>
                  <label>2nd <input name="delta3_2" type="number" /></label>
                  <label>3rd <input name="delta3_3" type="number" /></label>
                </div>
                <div class="curve-row">
                  <strong>4 players</strong>
                  <label>1st <input name="delta4_1" type="number" /></label>
                  <label>2nd <input name="delta4_2" type="number" /></label>
                  <label>3rd <input name="delta4_3" type="number" /></label>
                  <label>4th <input name="delta4_4" type="number" /></label>
                </div>
              </div>

              <div class="competitive-section">
                <div>
                  <h4>Matchmaking Expansion</h4>
                  <p class="muted">Control how quickly the private search window widens while a player waits.</p>
                </div>
                <div class="row three">
                  <label>Opening range <input name="firstRange" type="number" min="0" /></label>
                  <label>Second range <input name="secondRange" type="number" min="0" /></label>
                  <label>Maximum range <input name="maxRange" type="number" min="0" /></label>
                </div>
                <div class="row three">
                  <label>Expansion begins (sec) <input name="expandStartSeconds" type="number" min="1" /></label>
                  <label>Expand every (sec) <input name="expandEverySeconds" type="number" min="1" /></label>
                  <label>Expansion step <input name="expandStep" type="number" min="0" /></label>
                </div>
                <label>Expansion base <input name="expandBase" type="number" min="0" /></label>
              </div>

              <div class="competitive-section">
                <div>
                  <h4>Season Reset And Rewards</h4>
                  <p class="muted">Tune season cadence and the soft reset applied to returning ranked players.</p>
                </div>
                <div class="row three">
                  <label>Season days <input name="seasonLengthDays" type="number" min="1" /></label>
                  <label>Reward grace days <input name="rewardGraceDays" type="number" min="0" /></label>
                  <label>Reset retention <input name="softResetMultiplier" type="number" min="0" max="1" step="0.05" /></label>
                </div>
                <div class="row two">
                  <label>Reset anchor <input name="softResetAnchor" type="number" min="0" /></label>
                  <label>Reset floor <input name="softResetFloor" type="number" min="0" /></label>
                </div>
              </div>

              <details class="advanced-editor">
                <summary>Advanced League And Reward Data</summary>
                <p class="muted">Exact thresholds are private administrator data and never appear in player responses.</p>
                <label>League bands JSON <textarea name="leagueBands" rows="10"></textarea></label>
                <label>Season rewards JSON <textarea name="rewards" rows="8"></textarea></label>
              </details>

              <div class="actions">
                <button type="submit">Save Ranked Draft</button>
              </div>
            </form>

            <aside class="competitive-sidebar">
              <form id="competitiveSimulator" class="panel compact">
                <h3>Outcome Simulator</h3>
                <p class="muted">Preview the draft model without changing a player.</p>
                <div class="row two">
                  <label>Table size
                    <select name="playerCount"><option value="2">2 players</option><option value="3">3 players</option><option value="4">4 players</option></select>
                  </label>
                  <label>Finish
                    <select name="placement"><option value="1">1st</option><option value="2">2nd</option></select>
                  </label>
                </div>
                <label>Confidence stage
                  <select name="stage"><option value="placement">Returning placement</option><option value="calibration">Calibration</option><option value="established" selected>Established</option></select>
                </label>
                <div class="row two">
                  <label>Player rating <input name="mmr" type="number" min="0" /></label>
                  <label>Field average <input name="opponentMmr" type="number" min="0" /></label>
                </div>
                <p class="muted">First-time placement is finalized after all placement matches; this single-result preview models returning placements.</p>
                <button type="submit">Run Simulation</button>
                <div id="competitiveSimulationOutput" class="simulator-output muted">Choose a scenario to preview its movement.</div>
              </form>

              <div class="panel compact">
                <h3>League Map</h3>
                <p class="muted">Private thresholds used by every ladder.</p>
                <div id="competitiveLeaguePreview" class="league-preview"></div>
              </div>

              <div class="panel compact">
                <h3>Season Studio</h3>
                <div class="row">
                  <input id="seasonName" placeholder="Season name" />
                  <button id="createSeason">Create Season</button>
                </div>
                <div id="seasonOutput" class="list"></div>
              </div>
            </aside>
          </div>
          <div class="workspace">
            <div class="panel compact">
              <h3>Ranked Queues</h3>
              <button id="loadRankedQueues">Refresh Queues</button>
              <div id="rankedQueuesOutput" class="list"></div>
            </div>
            <form id="competitivePlayerEditor" class="panel compact">
              <h3>Ranked Player Tools</h3>
              <input name="userId" placeholder="Player user id or display name" />
              <label>Ladder
                <select name="playerCount"><option value="2">2-player</option><option value="3">3-player</option><option value="4">4-player</option></select>
              </label>
              <div class="row two">
                <input name="mmr" type="number" min="0" placeholder="MMR" />
                <input name="seasonBestMmr" type="number" min="0" placeholder="Season best MMR" />
              </div>
              <div class="row two">
                <input name="careerBestMmr" type="number" min="0" placeholder="Career best MMR" />
                <input name="placementsPlayed" type="number" min="0" placeholder="Placements played" />
              </div>
              <div class="row two">
                <input name="calibrationMatchesPlayed" type="number" min="0" placeholder="Calibration matches" />
                <input name="rankedGames" type="number" min="0" placeholder="Ranked games" />
              </div>
              <div class="row two">
                <input name="wins" type="number" min="0" placeholder="Ranked wins" />
                <input name="losses" type="number" min="0" placeholder="Ranked losses" />
              </div>
              <label><input name="clearHistory" type="checkbox" /> Clear ranked history before adding admin adjustment</label>
              <button type="submit">Apply Competitive Adjustment</button>
            </form>
          </div>
        </section>
        <section id="notifications" class="tab">
          <div class="panel">
            <div class="split-header">
              <div>
                <h2>Notifications</h2>
                <p class="muted">Configure push notification templates and send operational messages to registered devices.</p>
              </div>
              <button id="loadNotifications">Refresh Notifications</button>
            </div>
            <div id="notificationStats" class="statline"></div>
            <form id="notificationConfigEditor" class="editor">
              <label class="checkline"><input name="enabled" type="checkbox" /> Enable push notifications</label>
              <div id="notificationTemplateRows" class="list"></div>
              <label class="checkline"><input name="customEnabled" type="checkbox" /> Enable custom admin pushes</label>
              <label>Reason <input name="reason" placeholder="Required audit reason" /></label>
              <button type="submit">Save Notification Settings</button>
            </form>
          </div>
          <form id="customNotificationForm" class="panel compact">
            <h3>Send Custom Push</h3>
            <input name="target" placeholder="Optional user id or display name; leave blank for all registered devices" />
            <input name="title" placeholder="Notification title" required />
            <textarea name="body" rows="3" placeholder="Notification message" required></textarea>
            <input name="campaignId" placeholder="Optional campaign id" />
            <input name="reason" placeholder="Required audit reason" required />
            <button type="submit">Send Push</button>
          </form>
        </section>
        <section id="liveOps" class="tab">
          <div class="panel live-ops-hero">
            <div class="split-header">
              <div>
                <p class="eyebrow">Release Control</p>
                <h2>Live Operations</h2>
                <p class="muted">Stage releases, pause broken features, and protect matches already underway without another app build.</p>
              </div>
              <div class="actions-inline">
                <label class="checkline live-ops-global-toggle"><input id="liveOpsGlobalSwitch" type="checkbox" /> Global maintenance</label>
                <span id="liveOpsRevision" class="chip blue">Revision 0</span>
                <button id="loadLiveOps">Refresh</button>
              </div>
            </div>
            <div id="liveOpsImpact" class="live-ops-impact"></div>
          </div>

          <div class="live-ops-workspace">
            <div class="panel compact live-ops-tree-panel">
              <div class="split-header">
                <div>
                  <h3>Feature Tree</h3>
                  <p class="muted">Parent restrictions always override their children.</p>
                </div>
                <input id="liveOpsFeatureSearch" class="compact-search" placeholder="Find a feature" />
              </div>
              <div id="liveOpsFeatureTree" class="live-ops-tree"></div>
            </div>

            <form id="liveOpsEditor" class="panel compact live-ops-editor">
              <div>
                <p id="liveOpsSelectedGroup" class="eyebrow">System</p>
                <h3 id="liveOpsSelectedLabel">Global maintenance</h3>
                <code id="liveOpsSelectedKey">global</code>
              </div>
              <label>State
                <select name="state">
                  <option value="live">Live</option>
                  <option value="coming_soon">Coming Soon</option>
                  <option value="maintenance">Maintenance</option>
                  <option value="hidden">Hidden</option>
                </select>
              </label>
              <label>Player-facing title <input name="title" maxlength="80" placeholder="Temporarily unavailable" /></label>
              <label>Player message <textarea name="message" maxlength="280" rows="4" placeholder="Tell players what is happening and what to expect."></textarea></label>
              <div class="row two">
                <label>Publish restoration <input name="restoreAt" type="datetime-local" /></label>
                <label>Scheduled activation <input name="activateAt" type="datetime-local" /></label>
              </div>
              <label>Administrative reason <input name="reason" maxlength="240" placeholder="Required for the audit trail" required /></label>
              <div id="liveOpsPreview" class="live-ops-preview"></div>
              <div class="actions-inline">
                <button id="publishLiveOps" type="submit">Publish Now</button>
                <button id="scheduleLiveOps" type="button" class="ghost">Schedule</button>
              </div>
              <p id="liveOpsReadOnly" class="muted hidden">Your admin role has read-only Live Ops access.</p>
            </form>
          </div>

          <div class="live-ops-lower-grid">
            <div class="panel compact">
              <div class="split-header">
                <div>
                  <h3>Tester Preview</h3>
                  <p class="muted">Allowed testers bypass locked and hidden states, with a visible preview marker in the app.</p>
                </div>
                <span id="liveOpsTesterCount" class="chip">0 testers</span>
              </div>
              <div class="row">
                <input id="liveOpsTesterSearch" placeholder="Search player name, tag, or ID" />
                <button id="searchLiveOpsTesters" type="button" class="ghost">Search</button>
              </div>
              <div id="liveOpsTesterResults" class="live-ops-tester-results"></div>
              <label>Administrative reason <input id="liveOpsTesterReason" maxlength="240" placeholder="Required when saving tester access" /></label>
              <button id="saveLiveOpsTesters" type="button">Save Tester Access</button>
            </div>

            <div class="panel compact">
              <div class="split-header">
                <div>
                  <h3>Scheduled Changes</h3>
                  <p class="muted">One pending schedule is allowed per feature.</p>
                </div>
                <span id="liveOpsScheduleCount" class="chip">0 scheduled</span>
              </div>
              <div id="liveOpsSchedules" class="list"></div>
            </div>
          </div>

          <div class="panel compact">
            <div class="split-header">
              <div>
                <h3>Revision History</h3>
                <p class="muted">The latest 50 audited revisions are retained. Restoring a revision also clears pending schedules.</p>
              </div>
            </div>
            <div id="liveOpsRevisions" class="live-ops-revisions"></div>
          </div>
        </section>
        <section id="catalog" class="tab">
          <div class="panel">
            <div class="split-header">
              <div>
                <h2>Catalog Studio</h2>
                <p class="muted">Edit draft cosmetics, preview assets, then publish when ready.</p>
              </div>
              <div class="actions-inline">
                <button id="newCatalogItem" class="ghost">New Item</button>
                <button id="publishCatalog">Publish Draft</button>
                <button id="loadCatalog">Refresh</button>
              </div>
            </div>
            <div class="toolbar">
              <select id="catalogFilter">
                <option value="">All categories</option>
                <option value="cardBack">Card backs</option>
                <option value="avatarIcon">Avatar icons</option>
                <option value="avatarFrame">Avatar frames</option>
                <option value="avatarAccessory">Avatar accessories</option>
                <option value="title">Titles</option>
                <option value="tableTheme">Table themes</option>
              </select>
              <select id="catalogStateFilter">
                <option value="">All states</option>
                <option value="enabled">Enabled</option>
                <option value="disabled">Disabled</option>
                <option value="sale">On sale</option>
                <option value="archived">Archived</option>
              </select>
            </div>
            <div class="workspace">
              <div id="catalogOutput" class="list"></div>
              <form id="catalogEditor" class="panel compact hidden">
                <h3>Cosmetic Editor</h3>
                <label>ID <input name="id" readonly /></label>
                <label>Name <input name="name" required /></label>
                <label>Description <textarea name="description"></textarea></label>
                <div class="row two">
                  <label>Type
                    <select name="type">
                      <option value="cardBack">Card Back</option>
                      <option value="avatarIcon">Avatar Icon</option>
                      <option value="avatarFrame">Avatar Frame</option>
                      <option value="avatarAccessory">Avatar Accessory</option>
                      <option value="title">Title</option>
                      <option value="tableTheme">Table Theme</option>
                    </select>
                  </label>
                  <label>Source
                    <select name="shopCategory">
                      <option value="starter">Starter</option>
                      <option value="coin">Coin</option>
                      <option value="ranked">Ranked</option>
                      <option value="club">Club</option>
                      <option value="event">Event</option>
                    </select>
                  </label>
                </div>
                <div class="row two">
                  <label>Price <input name="price" type="number" min="0" /></label>
                  <label>Sale price <input name="salePrice" type="number" min="0" /></label>
                </div>
                <div class="row two">
                  <label>Unlock
                    <select name="unlockRequirement">
                      <option value="">None</option>
                      <option value="rank">Rank</option>
                      <option value="club">Club</option>
                      <option value="event">Event</option>
                      <option value="season">Season</option>
                      <option value="achievement">Achievement</option>
                      <option value="level">Level</option>
                    </select>
                  </label>
                  <label>Required MMR <input name="requiredMmr" type="number" min="0" /></label>
                </div>
                <label>Required league <input name="requiredLeague" /></label>
                <label>Season ID <input name="seasonId" /></label>
                <div class="row two">
                  <label>Background <input name="backgroundColor" placeholder="#132a40" /></label>
                  <label>Border <input name="borderColor" placeholder="#55e0a3" /></label>
                </div>
                <div class="row two">
                  <label>Accent <input name="accentColor" placeholder="#ffd166" /></label>
                  <label>Mark <input name="mark" placeholder="G9" /></label>
                </div>
                <div class="checks">
                  <label><input name="enabled" type="checkbox" /> Enabled</label>
                  <label><input name="sale" type="checkbox" /> On sale</label>
                  <label><input name="featured" type="checkbox" /> Featured</label>
                </div>
                <div id="catalogAssetRequirement" class="asset-requirement"></div>
                <label>Preview asset <input id="catalogAsset" type="file" accept="image/png,image/jpeg,image/webp" /></label>
                <div id="catalogAssetPreview" class="asset-preview empty">Choose an asset to preview it here.</div>
                <p id="catalogAssetError" class="error"></p>
                <div class="actions">
                  <button type="submit">Save Draft</button>
                  <button type="button" id="uploadCatalogAsset" class="ghost">Upload Asset</button>
                  <button type="button" id="duplicateCatalogItem" class="ghost">Duplicate</button>
                  <button type="button" id="archiveCatalogItem" class="danger">Archive</button>
                </div>
              </form>
            </div>
          </div>
          <div class="panel">
            <h2>Asset Guide</h2>
            <div class="guide">
              <p><strong>Avatar icons, frames, and accessories:</strong> PNG/WebP, exactly 512x512, under 2 MB.</p>
              <p><strong>Card backs:</strong> PNG/WebP, exactly 512x768, under 2 MB.</p>
              <p><strong>Table themes:</strong> PNG/WebP/JPEG, exactly 1024x1024, under 4 MB.</p>
              <p><strong>Naming:</strong> keep IDs lowercase with dashes. Never rename an ID after players own it; edit the title instead.</p>
            </div>
          </div>
        </section>
        <section id="clubs" class="tab">
          <div class="panel">
            <div class="split-header">
              <div>
                <h2>Club Operations</h2>
                <p class="muted">Search clubs, inspect members, handle requests, and resolve club support issues.</p>
              </div>
              <button id="loadClubs">Refresh Clubs</button>
            </div>
            <div class="row">
              <input id="clubSearch" placeholder="Search club name, tag, or id" />
              <button id="searchClubs">Search</button>
            </div>
            <div class="workspace">
              <div id="clubsOutput" class="list"></div>
              <div id="clubDetail" class="panel compact hidden"></div>
            </div>
          </div>
        </section>
        <section id="admins" class="tab">
          <div class="panel">
            <div class="split-header">
              <div>
                <h2>Admin Accounts</h2>
                <p class="muted">Owner-only controls for admin users, roles, MFA, lockouts, and password resets.</p>
              </div>
              <button id="loadAdmins">Refresh Admins</button>
            </div>
            <div id="adminRecoveryBanner" class="statline"></div>
            <form id="adminCreateForm" class="admin-create-grid">
              <label>Admin name <input name="displayName" placeholder="support lead" required /></label>
              <label>Email <input name="email" type="email" placeholder="admin@example.com" required /></label>
              <label>Role
                <select name="role">
                  <option value="readOnly">Read Only</option>
                  <option value="support">Support</option>
                  <option value="moderator">Moderator</option>
                  <option value="economy">Economy</option>
                  <option value="admin">Admin</option>
                  <option value="owner">Owner</option>
                </select>
              </label>
              <label>Optional temp password <input name="temporaryPassword" type="password" autocomplete="new-password" placeholder="Generated if blank" /></label>
              <label>Optional MFA code <input name="mfaCode" inputmode="numeric" placeholder="Generated if blank" /></label>
              <label>Reason <input name="reason" placeholder="Required audit reason" required /></label>
              <label class="checkline"><input name="mfaEnabled" type="checkbox" checked /> Require MFA</label>
              <button type="submit">Create Admin</button>
            </form>
            <div id="adminActionOutput" class="card hidden"></div>
            <div id="adminAccountsOutput" class="player-table-wrap"></div>
          </div>
        </section>
        <section id="audit" class="tab">
          <div class="panel">
            <h2>Audit Log</h2>
            <button id="loadAudit">Refresh Audit</button>
            <div id="auditOutput" class="list"></div>
          </div>
        </section>
      </section>
    </template>
    <script src="/admin/app.js" type="module"></script>
  </body>
</html>
